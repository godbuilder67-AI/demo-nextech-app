<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planet Explorer</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%230d6efd'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./style.css" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  </head>

  <body class="bg-dark text-light">
    <div id="app" class="d-flex flex-column min-vh-100">
      <navbar-component></navbar-component>
      <main class="flex-grow-1 overflow-auto">
        <router-view></router-view>
      </main>
    </div>

    <div id="rowen-gpt-widget" class="rowen-gpt-widget">
      <button
        id="rowen-gpt-toggle"
        class="rowen-gpt-toggle"
        type="button"
        aria-label="Open Rowen-GPT chat"
        aria-expanded="false">
        <span class="rowen-gpt-icon">🤖</span>
        <span class="rowen-gpt-label">Rowen-GPT</span>
      </button>

      <div id="rowen-gpt-panel" class="rowen-gpt-panel" aria-live="polite">
        <div class="rowen-gpt-panel-header">
          <strong>Rowen-GPT</strong>
          <button id="rowen-gpt-close" class="rowen-gpt-close" type="button" aria-label="Close chat">×</button>
        </div>

        <div id="rowen-gpt-messages" class="rowen-gpt-messages">
          <div class="rowen-gpt-message bot">Hi! I’m Rowen-GPT, your fake space helper.</div>
          <div class="rowen-gpt-message bot">Ask me about planets, stars, or your next big idea.</div>
        </div>

        <form id="rowen-gpt-form" class="rowen-gpt-form">
          <input
            id="rowen-gpt-input"
            class="rowen-gpt-input"
            type="text"
            placeholder="Type a message..."
            autocomplete="off" />
          <button class="rowen-gpt-send" type="submit">Send</button>
        </form>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
